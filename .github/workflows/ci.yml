# ============================================
# GitHub Actions CI/CD 工作流配置
# 用于自动化测试和部署
# ============================================

name: CI/CD Pipeline

# 触发条件
on:
  # 推送到 main 分支时触发
  push:
    branches:
      - main
      - develop
  # 创建 Pull Request 时触发
  pull_request:
    branches:
      - main
      - develop

# 全局环境变量
env:
  NODE_VERSION: "22"
  JAVA_VERSION: "21"
  JAVA_DISTRIBUTION: "temurin"

# ============================================
# Jobs 定义
# ============================================
jobs:

  # ------------------------------------------
  # 前端测试任务
  # 检查代码规范、编译构建是否通过
  # ------------------------------------------
  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest

    # 设置工作目录
    defaults:
      run:
        working-directory: ./frontend

    steps:
      # 1. 拉取代码
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 2. 配置 Node.js 环境
      - name: 设置 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json

      # 3. 安装依赖
      - name: 安装依赖
        run: npm ci

      # 4. 代码规范检查
      - name: 运行 ESLint 代码检查
        run: npm run lint

      # 5. 构建项目
      - name: 构建项目
        run: npm run build
        env:
          NODE_ENV: production

  # ------------------------------------------
  # 后端测试任务
  # 运行单元测试和集成测试
  # ------------------------------------------
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest

    # 设置工作目录
    defaults:
      run:
        working-directory: ./backend

    steps:
      # 1. 拉取代码
      - name: Checkout 代码
        uses: actions/checkout@v4

      # 2. 配置 Java 环境
      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: "maven"

      # 3. 运行测试
      - name: 运行 Maven 测试
        run: mvn test -B

      # 4. 上传测试报告（如果有）
      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: ./backend/target/surefire-reports/
          retention-days: 30

