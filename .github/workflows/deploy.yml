name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            echo "=== 开始部署 ==="
            
            cd /opt/app
            
            # 拉取最新代码
            git pull origin main
            
            # 重新构建 Docker 镜像
            docker build -t app-frontend ./frontend
            
            # 重启容器
            docker rm -f app-frontend 2>/dev/null
            docker run -d \
              --name app-frontend \
              --restart unless-stopped \
              -p 3000:3000 \
              app-frontend
            
            # 等待容器启动
            sleep 5
            
            # 检查容器状态
            if docker ps | grep -q app-frontend; then
              echo "=== 部署成功 ==="
              docker logs --tail 5 app-frontend
            else
              echo "=== 部署失败，查看日志 ==="
              docker logs app-frontend
              exit 1
            fi
