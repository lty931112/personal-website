# =============================================
# 开发环境配置
# =============================================

spring:
  # PostgreSQL 数据源配置
  datasource:
    url: jdbc:postgresql://localhost:5432/personal_website?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    # HikariCP 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: PersonalWebsiteHikariCP

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # 开发环境热部署
  devtools:
    restart:
      enabled: true
      additional-paths: src/main/java

# 日志配置
logging:
  level:
    root: info
    com.personal: debug
    com.baomidou.mybatisplus: debug
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 文件上传配置（开发环境使用本地存储）
file:
  upload:
    storage-type: local
    local-path: ./uploads
