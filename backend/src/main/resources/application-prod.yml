# =============================================
# 生产环境配置
# =============================================

server:
  # 生产环境关闭错误堆栈信息
  error:
    include-stacktrace: never

spring:
  # PostgreSQL 数据源配置（生产环境）
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:personal_website}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&sslmode=require
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50
      idle-timeout: 30000
      max-lifetime: 1800000
      connection-timeout: 30000
      pool-name: PersonalWebsiteHikariCP

  # Redis 配置（生产环境）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 50
          max-idle: 20
          min-idle: 10
          max-wait: 3000ms

  # 关闭开发工具
  devtools:
    restart:
      enabled: false

# MyBatis-Plus 生产环境关闭 SQL 日志
mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

# JWT 配置（生产环境使用环境变量）
jwt:
  secret: ${JWT_SECRET:default-secret-key-please-change-in-production}
  expiration: ${JWT_EXPIRATION:86400000}

# 日志配置（生产环境）
logging:
  level:
    root: warn
    com.personal: info
  file:
    name: ./logs/application.log
    max-size: 100MB
    max-history: 30
  logback:
    rollingpolicy:
      max-file-size: 100MB
      max-index: 10

# 文件上传配置（生产环境使用 MinIO）
file:
  upload:
    storage-type: minio
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket-name: ${MINIO_BUCKET:personal-website}

# SpringDoc 生产环境配置
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
