# ============================================
# Nginx 反向代理配置
# 负责将请求路由到前端和后端服务
# ============================================

# 工作进程数，auto 表示自动匹配 CPU 核心数
worker_processes auto;

# 错误日志配置
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    # 单个工作进程最大连接数
    worker_connections 1024;
}

http {
    # 引入 MIME 类型映射
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ------------------------------------------
    # 日志格式配置
    # ------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # ------------------------------------------
    # 性能优化配置
    # ------------------------------------------
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    client_max_body_size 50m;  # 允许上传最大 50MB 的文件

    # ------------------------------------------
    # Gzip 压缩配置
    # 启用 gzip 压缩以减少传输数据量，提升加载速度
    # ------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;           # 压缩级别 1-9，6 是性能和压缩率的平衡点
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_min_length 1024;        # 大于 1KB 的响应才启用压缩
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/opentype
        font/ttf
        font/woff
        font/woff2;

    # ------------------------------------------
    # 上游服务定义
    # ------------------------------------------

    # 前端服务 - Next.js 应用
    upstream frontend {
        server frontend:3000;
        keepalive 32;  # 保持 32 个长连接
    }

    # 后端服务 - Spring Boot API
    upstream backend {
        server backend:8080;
        keepalive 32;
    }

    # ------------------------------------------
    # HTTP 服务器配置
    # ------------------------------------------
    server {
        listen 80;
        server_name localhost;

        # 字符集
        charset utf-8;

        # ------------------------------------------
        # 静态资源缓存策略
        # 根据文件类型设置不同的缓存过期时间
        # ------------------------------------------

        # 图片、字体等不常变化的静态资源 - 长期缓存
        location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|bmp|tiff)$ {
            proxy_pass http://frontend;
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # CSS 和 JavaScript 文件 - 带内容哈希的长期缓存
        location ~* \.(css|js)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # 字体文件 - 长期缓存
        location ~* \.(woff|woff2|ttf|otf|eot)$ {
            proxy_pass http://frontend;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ------------------------------------------
        # API 路由 - 代理到后端服务
        # ------------------------------------------

        # 后端 API 接口
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（如果需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 超时设置
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
            proxy_read_timeout 120s;

            # 禁用 API 响应缓存
            add_header Cache-Control "no-store, no-cache, must-revalidate";
            expires -1;
        }

        # Swagger API 文档
        location /api-docs/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Swagger UI 静态资源可以缓存
            expires 1h;
        }

        # Swagger OpenAPI JSON
        location /v3/api-docs {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ------------------------------------------
        # 前端路由 - 代理到 Next.js 服务
        # ------------------------------------------
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket 支持（Next.js HMR 开发模式需要）
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # ------------------------------------------
        # 错误页面
        # ------------------------------------------
        error_page 404             /404.html;
        error_page 500 502 503 504 /50x.html;

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
